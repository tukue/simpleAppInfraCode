apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
data:
  policy.default: role:readonly
  policy.csv: |
    p, role:platform-admin, applications, *, *, allow
    p, role:platform-admin, projects, *, *, allow
    p, role:platform-admin, clusters, *, *, allow
    p, role:platform-admin, repositories, *, *, allow

    p, role:app-developer, applications, get, tenant-apps/*, allow
    p, role:app-developer, applications, sync, tenant-apps/*, allow
    p, role:app-developer, applications, update, tenant-apps/*, allow

    g, platform-admins, role:platform-admin
    g, app-developers, role:app-developer

  scopes: "[groups, email]"
