apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
data:
  # Repository connection settings
  repositories: |
    - url: https://github.com/tukue/simpleAppInfraCode.git
      type: git
      name: infra-repo

  # Skip validating resources that use server-side apply
  resource.customizations: |
    argoproj.io/Application:
      ignoreDifferences: |
        jsonPointers:
        - /spec/source/targetRevision

  # Enable HA and performance settings
  timeout.reconciliation: 180s
  admin.enabled: "true"
  statusbadge.enabled: "true"

  # Config management plugins
  configManagementPlugins: |
    - name: argocd-vault-plugin
      init:
        command: ["sh", "-c"]
        args: ["helm dependency build"]
      generate:
        command: ["sh", "-c"]
        args:
          [
            "helm template . --name-template $ARGOCD_APP_NAME --namespace $ARGOCD_APP_NAMESPACE $ARGOCD_ENV_HELM_OPTS",
          ]
      lockRepo: true
