suite: ExternalSecret
templates:
  - externalsecret.yaml
values:
  - ../values.yaml
tests:
  - it: should not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when enabled with data
    set:
      externalSecret.enabled: true
      externalSecret.data:
        - secretKey: db-password
          remoteRef:
            key: dev/app/db-password
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: spec.refreshInterval
          value: 1h
      - equal:
          path: spec.secretStoreRef.name
          value: kubernetes-backend
      - equal:
          path: spec.secretStoreRef.kind
          value: ClusterSecretStore
      - equal:
          path: spec.data[0].secretKey
          value: db-password
      - equal:
          path: spec.data[0].remoteRef.key
          value: dev/app/db-password
