replicaCount: 3

image:
  repository: ${{ parameters.imageRepo }}${{ parameters.appName }}
  tag: "1.0.0"

ingress:
  enabled: true
  hosts:
    - host: ${{ parameters.appName }}.example.com
      paths:
        - path: /
          pathType: Prefix

env:
  - name: ENVIRONMENT
    value: "prod"
  - name: PORT
    value: "${{ parameters.port }}"

externalSecret:
  enabled: true
  data:
    - secretKey: db-password
      remoteRef:
        key: prod/${{ parameters.appName }}/db-password
