replicaCount: 3

image:
  repository: ${{ imageRepo }}/${{ appName }}
  tag: "1.0.0"

ingress:
  enabled: true
  hosts:
    - host: ${{ appName }}.example.com
      paths:
        - path: /
          pathType: Prefix

env:
  - name: ENVIRONMENT
    value: "prod"
  - name: PORT
    value: "${{ port }}"

externalSecret:
  enabled: true
  data:
    - secretKey: db-password
      remoteRef:
        key: prod/${{ appName }}/db-password
