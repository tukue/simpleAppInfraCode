replicaCount: 2

image:
  tag: "2.0.0-rc1"

ingress:
  enabled: true
  hosts:
    - host: app-b-stage.example.com
      paths:
        - path: /
          pathType: Prefix

env:
  - name: ENVIRONMENT
    value: "stage"
  - name: MESSAGE
    value: "Hello from app-b (stage)"

externalSecret:
  enabled: true
  data:
    - secretKey: db-password
      remoteRef:
        key: stage/app-b/db-password
