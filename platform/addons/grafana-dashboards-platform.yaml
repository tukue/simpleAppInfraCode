apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-platform
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/managed-by: platform
data:
  app-overview.json: |
    {
      "__inputs": [],
      "__requires": [],
      "title": "Platform App Overview",
      "version": 1,
      "panels": [
        {
          "title": "CPU usage",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=~\"dev|stage|prod\"}[5m])) by (namespace, pod)",
              "legendFormat": "{{namespace}} / {{pod}}"
            }
          ]
        },
        {
          "title": "Memory usage",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(container_memory_usage_bytes{namespace=~\"dev|stage|prod\"}) by (namespace, pod)",
              "legendFormat": "{{namespace}} / {{pod}}"
            }
          ]
        },
        {
          "title": "Request rate",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(nginx_ingress_controller_requests{namespace=~\"dev|stage|prod\"}[5m])) by (namespace)",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "title": "Pod status",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{namespace=~\"dev|stage|prod\", phase=\"Running\"}) by (namespace)",
              "legendFormat": "{{namespace}}"
            }
          ]
        }
      ],
      "tags": ["platform", "kubernetes"],
      "schemaVersion": 38
    }
